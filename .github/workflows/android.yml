name: Build Android Debug APK From Zip

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip trytok-app-android.zip -d extracted_project
        if [ -d "extracted_project/trytok-app-android/trytok-app" ]; then
          mv extracted_project/trytok-app-android/trytok-app/* .
          mv extracted_project/trytok-app-android/trytok-app/.* . 2>/dev/null || true
        elif [ -d "extracted_project/trytok-app" ]; then
          mv extracted_project/trytok-app/* .
          mv extracted_project/trytok-app/.* . 2>/dev/null || true
        else
          mv extracted_project/* .
          mv extracted_project/.* . 2>/dev/null || true
        fi
        rm -rf extracted_project trytok-app-android.zip

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm install
        npm install -D typescript ts-node @types/node

    - name: Build Web Assets
      run: npm run build --if-present

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Sync Capacitor Android Project
      run: npx cap sync android

    - name: Repair Gradle Wrapper and Build APK
      working-directory: android
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
